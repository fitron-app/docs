name: 部署文档到 Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建文档
        run: npm run docs:build

      - name: 检查 Cloudflare 密钥是否已配置
        id: check_secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  未检测到 CLOUDFLARE_API_TOKEN，跳过部署步骤。"
            echo "请在仓库 Settings → Secrets → Actions 中添加："
            echo "  CLOUDFLARE_API_TOKEN"
            echo "  CLOUDFLARE_ACCOUNT_ID"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: 部署到 Cloudflare Pages
        if: steps.check_secrets.outputs.configured == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fitness-system-docs
          directory: docs/.vitepress/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
